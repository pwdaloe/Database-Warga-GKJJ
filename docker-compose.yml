services:
  postgres:
    image: postgres:16-alpine
    container_name: gkjj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gkjj
      POSTGRES_PASSWORD: gkjj_dev_password
      POSTGRES_DB: gkjj_db
    ports:
      - "5435:5432"  # 5432 sudah dipakai PostgreSQL lokal, 5433/5434 dipakai project lain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gkjj -d gkjj_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gkjj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
