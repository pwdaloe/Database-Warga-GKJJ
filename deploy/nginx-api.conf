# Nginx — API: api.gkjjakarta.org
# Salin ke: /etc/nginx/sites-available/api.gkjjakarta.org
# Aktifkan: ln -s /etc/nginx/sites-available/api.gkjjakarta.org /etc/nginx/sites-enabled/
# SSL     : certbot --nginx -d api.gkjjakarta.org

server {
    listen 80;
    server_name api.gkjjakarta.org;

    # Certbot akan tambah redirect HTTPS di sini secara otomatis

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout untuk import batch Excel
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Upload file Excel (import)
    client_max_body_size 20M;

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
