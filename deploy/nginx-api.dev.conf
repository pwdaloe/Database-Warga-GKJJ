# Nginx — API TESTING: api.purwandaru.com
# Salin ke: /etc/nginx/sites-available/api.purwandaru.com
# Aktifkan: ln -s /etc/nginx/sites-available/api.purwandaru.com /etc/nginx/sites-enabled/
# SSL     : certbot --nginx -d api.purwandaru.com

server {
    listen 80;
    server_name api.purwandaru.com;

    # Certbot akan tambah redirect HTTPS di sini secara otomatis

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }

    client_max_body_size 20M;

    add_header X-Content-Type-Options  "nosniff";
    add_header X-Frame-Options         "DENY";
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
}
