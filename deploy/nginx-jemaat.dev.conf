# Nginx — Frontend TESTING: jemaat.purwandaru.com
# Salin ke: /etc/nginx/sites-available/jemaat.purwandaru.com
# Aktifkan: ln -s /etc/nginx/sites-available/jemaat.purwandaru.com /etc/nginx/sites-enabled/
# SSL     : certbot --nginx -d jemaat.purwandaru.com

server {
    listen 80;
    server_name jemaat.purwandaru.com;

    # Certbot akan tambah redirect HTTPS di sini secara otomatis

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://127.0.0.1:3000;
    }

    client_max_body_size 20M;
}
